services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: vbc
      POSTGRES_PASSWORD: vbc
      POSTGRES_DB: vbc_claims
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://vbc:vbc@postgres:5432/vbc_claims
      APP_ENV: local
      LOG_JSON: "false"
      MIGRATE_ON_STARTUP: "false"
    ports:
      - "8001:8001"
    depends_on:
      - postgres

volumes:
  pgdata:
