services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: vbc
      POSTGRES_PASSWORD: vbc
      POSTGRES_DB: vbc_claims
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  api:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        COPY . /app
        RUN pip install --no-cache-dir -U pip && pip install --no-cache-dir -e .
        CMD ["vbc-claims-api"]
    environment:
      DATABASE_URL: postgresql+psycopg2://vbc:vbc@postgres:5432/vbc_claims
    ports:
      - "8001:8001"
    depends_on:
      - postgres

volumes:
  pgdata:
