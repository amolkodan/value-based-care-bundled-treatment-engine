name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vbc
          POSTGRES_PASSWORD: vbc
          POSTGRES_DB: vbc_claims
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vbc -d vbc_claims"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg2://vbc:vbc@localhost:5432/vbc_claims
      RUN_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check src tests
      - name: Types
        run: |
          mypy src
      - name: Tests
        run: |
          pytest -q
